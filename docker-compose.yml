services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: inventory-hub:local
    container_name: inventory-hub
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:/data/app.db
      SESSION_SECRET: ${SESSION_SECRET:-please-change-me-in-production-this-is-not-secure}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:3001/auth/google/callback}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3001}
      UPLOAD_DIR: /data/uploads
    volumes:
      - inventory_data:/data
    ports:
      - '${PORT:-3001}:3001'

volumes:
  inventory_data:
