# Turn-key SQLite backups via Litestream (continuous replication to S3).
#
# Losing /data/app.db means losing everything, so this is the recommended
# production backup path. It runs a `litestream/litestream` sidecar that streams
# every change to the app.db to S3-compatible storage in near real time
# (recovery point ≈ a few seconds).
#
# HOW TO ENABLE
#   1. Copy the env template below into your .env (or your platform's env UI) and
#      fill in the S3 bucket/endpoint/credentials.
#   2. Start the stack with BOTH compose files:
#        docker compose -f docker-compose.yml -f docker-compose.litestream.yml up -d
#   3. Once replication is confirmed, set BACKUPS_CONFIGURED=1 on the `app`
#      service so the "backups not configured" admin warning disappears.
#
# NOTE: Litestream replicates only the SQLite database, NOT /data/uploads
# (damage photos & attachments). Back those up separately (rclone/restic/tar) —
# see docs/SELF_HOSTING.md.
#
# Required env (see .env):
#   LITESTREAM_S3_BUCKET       e.g. my-backups
#   LITESTREAM_S3_PATH         e.g. inventory-hub
#   LITESTREAM_S3_ENDPOINT     e.g. https://s3.eu-central-1.amazonaws.com
#                              (or your MinIO/R2/Backblaze endpoint)
#   LITESTREAM_S3_REGION       e.g. auto (or eu-central-1)
#   LITESTREAM_ACCESS_KEY_ID   S3 access key
#   LITESTREAM_SECRET_ACCESS_KEY   S3 secret key

services:
  app:
    environment:
      # Silences the admin "backups not configured" warning in Settings.
      BACKUPS_CONFIGURED: '1'
    depends_on:
      - litestream

  litestream:
    image: litestream/litestream:latest
    container_name: inventory-hub-litestream
    restart: unless-stopped
    command: replicate
    environment:
      # Litestream picks these up as defaults referenced by the config below.
      LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_ACCESS_KEY_ID:?set S3 access key}
      LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_SECRET_ACCESS_KEY:?set S3 secret key}
      LITESTREAM_S3_BUCKET: ${LITESTREAM_S3_BUCKET:?set S3 bucket}
      LITESTREAM_S3_PATH: ${LITESTREAM_S3_PATH:-inventory-hub}
      LITESTREAM_S3_ENDPOINT: ${LITESTREAM_S3_ENDPOINT:-}
      LITESTREAM_S3_REGION: ${LITESTREAM_S3_REGION:-auto}
    volumes:
      # Same named volume as the app, so litestream can read /data/app.db.
      - inventory_data:/data
      - ./litestream.yml:/etc/litestream.yml:ro

volumes:
  inventory_data:
